serenity {
  project.name = "Saucedemo - Playwright Screenplay - Cibertec"
  take.screenshots = AFTER_EACH_STEP
  reports {
    show.step.details = true
    show.manual.tests = false
  }
}


# Configuración específica de Playwright
playwright {
  browser = "chromium"
  headless = false
  default.timeout = 10000
  viewport {
    width = 1366
    height = 768
  }
}

# URL base de la aplicación bajo prueba
saucedemo {
  base.url = "https://www.saucedemo.com"
}
